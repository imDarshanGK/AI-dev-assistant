name: Celebrate First Contribution

on:
  pull_request:
    types: [closed]

permissions:
  pull-requests: read
  issues: write

jobs:
  celebrate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Celebrate first merged PR
        uses: actions/github-script@v7

        with:
          script: |
            const sender =
              context.payload.pull_request.user.login;

            const prNumber =
              context.payload.pull_request.number;

            // Ignore bots
            if (sender === 'github-actions[bot]') {
              return;
            }

            // Get closed PRs
            const { data: prs } =
              await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'closed',
                per_page: 100
              });

            // Find previous merged PRs by same user
            const mergedByUser = prs.filter(pr =>
              pr.user &&
              pr.user.login === sender &&
              pr.merged_at !== null &&
              pr.number !== prNumber
            );

            // Only celebrate first merged PR
            if (mergedByUser.length === 0) {

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,

                body: `# 🎉 First Contribution Merged!

Congratulations @${sender} 🚀

Your first contribution has been successfully merged into **QyverixAI**.

Welcome to the contributor community and thank you for improving the project 💙

## What's next?
- Explore more open issues
- Try intermediate-level tasks
- Continue building your open source profile

## Helpful Links
- Issues:
  https://github.com/${context.repo.owner}/${context.repo.repo}/issues

- Contributing Guide:
  https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md

Thank you for contributing to QyverixAI ⭐`
              });

            } else {

              console.log(
                'Contributor already has merged PRs.'
              );

            }
