name: Auto Label

on:
  issues:
    types: [opened, edited]

  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label-issues:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;

            const labels = [];

            // -------------------------
            // Type labels
            // -------------------------

            if (text.match(/\bfix\b|\bbug\b|\berror\b|\bcrash\b|\bbroken\b/))
              labels.push('type:bug');

            if (text.match(/\badd\b|\bfeature\b|\benhance\b|\bnew\b|\bimplement\b/))
              labels.push('enhancement');

            if (text.match(/\bdoc\b|\breadme\b|\bcontribut\b|\bguide\b/))
              labels.push('type:docs');

            if (text.match(/\btest\b|\bspec\b|\bpytest\b|\bcoverage\b/))
              labels.push('type:testing');

            if (text.match(/\baccess\b|\baria\b|\bscreen reader\b|\bwcag\b/))
              labels.push('type:accessibility');

            if (text.match(/\bsecur\b|\bvulner\b|\bxss\b|\binjection\b/))
              labels.push('security');

            if (text.match(/\bperform\b|\bcache\b|\bspeed\b|\boptim\b|\bslow\b/))
              labels.push('performance');

            if (text.match(/\bci\b|\bworkflow\b|\bgithub action\b|\bdeploy\b/))
              labels.push('type:devops');

            // -------------------------
            // Area labels
            // -------------------------

            if (text.match(/\bfrontend\b|\bui\b|\bhtml\b|\bcss\b|\bindex\.html\b/))
              labels.push('frontend');

            if (text.match(/\bbackend\b|\bapi\b|\bfastapi\b|\bendpoint\b|\brouter\b/))
              labels.push('backend');

            // -------------------------
            // Difficulty labels
            // -------------------------

            if (text.match(/\bbeginner\b|\bgood first\b/))
              labels.push('level:beginner');

            if (text.match(/\bintermediate\b/))
              labels.push('level:intermediate');

            if (text.match(/\badvanced\b|\bcomplex\b/))
              labels.push('level:advanced');

            // -------------------------
            // GSSoC label
            // -------------------------

            labels.push('gssoc2026');

            // Remove duplicates
            const uniqueLabels = [...new Set(labels)];

            // Existing labels on issue
            const existingLabels = context.payload.issue.labels.map(
              label => label.name
            );

            // Only add labels not already present
            const newLabels = uniqueLabels.filter(
              label => !existingLabels.includes(label)
            );

            if (newLabels.length > 0) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.payload.issue.number,
                labels: newLabels
              });
            }

  label-prs:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
