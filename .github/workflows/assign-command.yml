name: Assign Command

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  assign:
    # Ignore pull request comments
    if: github.event.issue.pull_request == null

    runs-on: ubuntu-latest

    steps:
      - name: Handle /assign command
        uses: actions/github-script@v7

        with:
          script: |
            // Safety guard
            if (!context.payload.comment) return;

            const comment =
              context.payload.comment.body
                .trim()
                .toLowerCase();

            const sender =
              context.payload.comment.user.login;

            const issue = context.payload.issue;

            // Ignore bots and maintainer
            if (
              sender === 'github-actions[bot]' ||
              sender === 'imDarshanGK'
            ) {
              return;
            }

            // Only run for /assign
            if (comment !== '/assign') return;

            // Current assignees
            const assignees = issue.assignees || [];

            // Already assigned to someone else
            const assignedToOthers = assignees.some(
              a => a.login !== sender
            );

            if (assignedToOthers) {

              const assignedUsers = assignees
                .map(a => `@${a.login}`)
                .join(', ');

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,

                body: `Sorry @${sender} 👋

This issue is already assigned to ${assignedUsers}.

Please choose another available issue 🚀`
              });

              return;
            }

            // Already assigned to same user
            const alreadyAssignedToSender =
              assignees.some(
                a => a.login === sender
              );

            if (alreadyAssignedToSender) {

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,

                body: `@${sender} you are already assigned to this issue ✅`
              });

              return;
            }

            // Check if user already has another assigned issue
            const { data: openIssues } =
              await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                assignee: sender
              });

            // Ignore pull requests and current issue
            const otherAssignedIssues =
              openIssues.filter(
                i =>
                  !i.pull_request &&
                  i.number !== issue.number
              );

            if (otherAssignedIssues.length > 0) {

              const issueList =
                otherAssignedIssues
                  .map(i => `#${i.number}`)
                  .join(', ');

              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,

                body: `Hi @${sender} 👋

You already have assigned issue(s): ${issueList}

Please complete your current assigned issue before requesting a new one.

This helps keep contributions active and prevents issue blocking 🚀`
              });

              return;
            }

            // Assign issue
            await github.rest.issues.addAssignees({
              ...context.repo,
              issue_number: issue.number,
              assignees: [sender]
            });

            // Success comment
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,

              body: `✅ Assigned to @${sender}

Please complete this issue within 7 days.

Before starting:
- Read CONTRIBUTING.md
- Run tests before opening a PR

Happy coding 🚀`
            });
