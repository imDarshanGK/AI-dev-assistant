name: Duplicate Check

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check for duplicate issues
        uses: actions/github-script@v7

        with:
          script: |
            const issue = context.payload.issue;

            if (!issue) return;

            const title =
              issue.title.toLowerCase().trim();

            const issueNumber = issue.number;

            // Ignore bots
            if (
              context.payload.sender.login ===
              'github-actions[bot]'
            ) {
              return;
            }

            // Fetch open issues
            const { data: issues } =
              await github.rest.issues.listForRepo({
                ...context.repo,
                state: 'open',
                per_page: 100
              });

            // Simple duplicate detection
            const keywords = title
              .split(' ')
              .filter(word => word.length > 3)
              .slice(0, 5);

            const duplicates = issues.filter(i => {

              // Ignore current issue
              if (i.number === issueNumber) {
                return false;
              }

              // Ignore pull requests
              if (i.pull_request) {
                return false;
              }

              const existingTitle =
                i.title.toLowerCase();

              // Match by keyword overlap
              return keywords.some(word =>
                existingTitle.includes(word)
              );
            });

            // No duplicates found
            if (duplicates.length === 0) {
              return;
            }

            // Build duplicate list
            const duplicateList = duplicates
              .slice(0, 5)
              .map(i =>
                `- #${i.number} — ${i.title}`
              )
              .join('\n');

            // Comment on issue
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issueNumber,

              body:
`⚠️ Possible duplicate issue detected

The following issue(s) may already exist:

${duplicateList}

Please check whether your issue is already being discussed or worked on.

If your issue is different, explain the difference in a comment and a maintainer will review it 🚀`
            });

            // Add label safely
            try {

              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: issueNumber,
                labels: ['question']
              });

            } catch (error) {

              console.log(
                'Label add failed:',
                error.message
              );

            }
