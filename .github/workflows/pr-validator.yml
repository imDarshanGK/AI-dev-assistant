name: PR Validator

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            const title = pr.title || '';
            const sender = pr.user.login;
            const prNumber = pr.number;

            const errors = [];

            // =========================================
            // 1. PR title validation
            // =========================================
            const validTitle =
              /^(feat|fix|docs|test|refactor|chore|ci|style|perf)(\(.+\))?: .+/i.test(title);

            if (!validTitle) {
              errors.push(
                '❌ **Invalid PR title format**\\nUse formats like:\\n- `feat: add dark mode toggle`\\n- `fix(backend): resolve API timeout`'
              );
            }

            // =========================================
            // 2. Linked issue validation
            // =========================================
            const hasLinkedIssue =
              /(fixes|closes|resolves)\s+#\d+/i.test(body);

            if (!hasLinkedIssue) {
              errors.push(
                '❌ **No linked issue found**\\nAdd `Fixes #issue-number` in the PR description.'
              );
            }

            // =========================================
            // 3. Description length
            // =========================================
            if (body.trim().length < 50) {
              errors.push(
                '❌ **PR description is too short**\\nPlease explain your changes properly.'
              );
            }

            // =========================================
            // 4. Checklist validation
            // =========================================
            const uncheckedItems =
              (body.match(/- \[ \]/g) || []).length;

            if (uncheckedItems > 0) {
              errors.push(
                `❌ **${uncheckedItems} checklist item(s) are still unchecked**`
              );
            }

            // =========================================
            // Validation result
            // =========================================
            if (errors.length > 0) {

              // Add label
              try {
                await github.rest.issues.addLabels({
                  ...context.repo,
                  issue_number: prNumber,
                  labels: ['needs review']
                });
              } catch (e) {}

              // Comment
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: prNumber,
                body:
`## PR Validation Failed ❌

Hi @${sender},

Your PR needs some fixes before maintainers can review it.

${errors.join('\n\n')}

Please update your PR and push the changes.

Read:
- CONTRIBUTING.md
- PR template checklist
`
              });

              core.setFailed('PR validation failed.');

            } else {

              // Remove needs review label if validation passes
              try {
                await github.rest.issues.removeLabel({
                  ...context.repo,
                  issue_number: prNumber,
                  name: 'needs review'
                });
              } catch (e) {}

              console.log('PR validation passed.');
            }
