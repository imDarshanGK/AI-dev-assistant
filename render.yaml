services:
  - type: web
    name: qyverixai
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: RATE_LIMIT_PER_MINUTE
        value: 30
      - key: LLM_ENABLED
        value: false
    staticPublishPath: frontend
    routes:
      - type: rewrite
        source: /app
        destination: /frontend/index.html