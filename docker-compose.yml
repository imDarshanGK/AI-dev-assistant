

services:
  backend:
    build: .
    container_name: ai-dev-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    # Poll /healthz/ready so Docker Compose (and the frontend service) know
    # when the backend is truly ready to serve traffic.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Stop retrying after 3 consecutive failures — makes the failure visible
    # rather than spinning in a crash-restart loop.
    restart: on-failure:3
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: ai-dev-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    # Only start once the backend health check passes.
    depends_on:
      backend:
        condition: service_healthy
    restart: on-failure:3

  db:
    image: postgres:16
    container_name: ai-dev-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidevdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: