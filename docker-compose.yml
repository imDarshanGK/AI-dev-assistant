version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-dev-backend:prod
    container_name: ai-dev-backend
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    # Removed host volume mounts and --reload for performance and isolation
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai_prod_network

  frontend:
    image: nginx:alpine
    container_name: ai-dev-frontend
    restart: always
    ports:
      - "80:80" # Exposing standard web port 80 instead of 3000
    volumes:
      # If serving vanilla static files, we bake them or copy them safely
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - ai_prod_network

  db:
    image: postgres:16-alpine
    container_name: ai-dev-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Removed public port exposure entirely to secure the database
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai_prod_network

volumes:
  postgres_prod_data:

networks:
  ai_prod_network:
    driver: bridge
