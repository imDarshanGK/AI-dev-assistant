

services:
  backend:
    build: .
    container_name: ai-dev-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/live', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - db

  frontend:
    image: nginx:alpine
    container_name: ai-dev-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: ai-dev-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aidevdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: only needed to exercise the Redis-backed token denylist locally
  # (set REDIS_URL=redis://redis:6379/0 in .env to opt in). The backend falls
  # back to an in-memory denylist when REDIS_URL is unset, which is fine for
  # this single-replica compose setup, so nothing depends_on this service.
  redis:
    image: redis:7-alpine
    container_name: ai-dev-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
