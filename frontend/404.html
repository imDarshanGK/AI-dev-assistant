<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | QyverixAI</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icon.svg">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    (function() {
      const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('qyx_theme') || (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>
  <style>
    :root {
      --bg: #0a0c10;
      --bg2: #0f1117;
      --bg3: #161b24;
      --border: rgba(255, 255, 255, 0.07);
      --text: #e8eaf0;
      --text2: #8892a4;
      --text3: #4a5568;
      --accent: #5b9cf6;
      --accent2: #7c3aed;
      --green: #22d47b;
      --red: #f25757;
      --r: 12px;
      --r2: 8px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --font-ui: 'Inter', sans-serif;
      --font-disp: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    [data-theme="light"] {
      --bg: #f4f6fb;
      --bg2: #ffffff;
      --bg3: #eef1f7;
      --border: rgba(0, 0, 0, 0.07);
      --text: #111827;
      --text2: #4b5563;
      --text3: #9ca3af;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-ui);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      line-height: 1.6;
      transition: background var(--transition), color var(--transition);
    }

    ::selection {
      background: var(--accent);
      color: #fff;
    }

    .error-container {
      text-align: center;
      padding: 2rem;
      max-width: 520px;
      width: 90%;
    }

    .error-code {
      font-family: var(--font-disp);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .error-title {
      font-family: var(--font-disp);
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: var(--text);
    }

    .error-desc {
      font-size: 1rem;
      color: var(--text2);
      margin-bottom: 2rem;
      line-height: 1.7;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--r2);
      font-family: var(--font-ui);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(91, 156, 246, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(91, 156, 246, 0.5);
    }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg2);
      border-color: var(--accent);
      color: var(--accent);
    }

    .error-illustration {
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }

    .error-illustration svg {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 480px) {
      .error-actions {
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-illustration">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">
      The page you're looking for doesn't exist or has been moved.
      Check the URL or navigate back to continue.
    </p>
    <div class="error-actions">
      <a href="./" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Back to Home
      </a>
      <button class="btn btn-secondary" onclick="history.back()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Go Back
      </button>
    </div>
  </div>
</body>
</html>
