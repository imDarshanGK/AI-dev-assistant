<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Developer Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">
</head>
<body>
    <main class="page">
        <section class="card">
            <div class="top-bar">
                <h1>AI Developer Assistant</h1>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">Dark mode</button>
            </div>
            <p class="subtitle">Explain code, debug issues, and improve quality with beginner-friendly feedback.</p>

            <div class="field-group">
                <label for="api-base">Backend API URL</label>
                <input id="api-base" type="text" value="http://localhost:8000" placeholder="https://your-backend.onrender.com" />
            </div>

            <form id="assistant-form">
                <div class="field-group">
                    <label for="action">Action</label>
                    <select id="action">
                        <option value="explanation">Explain Code</option>
                        <option value="debugging">Debug Code</option>
                        <option value="suggestions">Improve Code</option>
                        <option value="analyze">Full Analysis</option>
                    </select>
                </div>

                <div class="field-group">
                    <label for="code-input">Code Input</label>
                    <textarea id="code-input" placeholder="Paste your code here..." rows="12"></textarea>
                </div>

                <div class="field-group">
                    <label for="code-file">Upload Code File (.py, .js, .java)</label>
                    <input id="code-file" type="file" accept=".py,.js,.java,text/plain" />
                </div>

                <div class="actions">
                    <button id="submit-btn" type="submit">Run Assistant</button>
                    <button id="clear-btn" type="button">Clear</button>
                </div>
            </form>

            <section class="result-wrap">
                <h2>Result</h2>
                <div id="status" class="status">Ready</div>
                <div class="result-actions">
                    <button id="copy-btn" type="button">Copy Result</button>
                </div>
                <pre id="result" aria-live="polite">Your result will appear here.</pre>
            </section>

            <section class="history-wrap">
                <div class="history-header">
                    <h2>Recent Queries</h2>
                    <button id="clear-history-btn" type="button">Clear History</button>
                </div>
                <ul id="history-list" class="history-list"></ul>
            </section>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
