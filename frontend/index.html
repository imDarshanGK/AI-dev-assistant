<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QyverixAI - Code Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <link rel="icon" type="image/x-icon" href="public/favicon.ico">
</head>
<body>
    <div class="app-shell">
        <header class="top-nav">
            <div class="brand">
                <span class="brand-kicker">AI Coding Copilot</span>
                <h1>QyverixAI</h1>
            </div>
            <div class="nav-actions">
                <label class="api-field" for="api-base">API</label>
                <input id="api-base" type="text" placeholder="http://localhost:8000" />
                <button id="theme-toggle" type="button">Dark</button>
            </div>
        </header>

        <main class="chat-layout">
            <section id="chat-thread" class="chat-thread" aria-live="polite">
                <article class="message assistant">
                    <div class="message-header">
                        <span>QyverixAI</span>
                    </div>
                    <div class="message-body">
                        <p>I am your code copilot. Paste code, ask a question, and I will explain, fix, or optimize it.</p>
                    </div>
                </article>
            </section>

            <form id="chat-form" class="composer">
                <div class="composer-row">
                    <textarea id="code-input" rows="6" placeholder="Paste code (optional)..."></textarea>
                    <textarea id="message-input" rows="3" placeholder="Ask: Explain this code / Fix this code / Optimize this code..."></textarea>
                </div>
                <div class="composer-actions">
                    <div class="quick-actions">
                        <button type="button" class="quick-btn" data-prompt="Explain this code">Explain</button>
                        <button type="button" class="quick-btn" data-prompt="Fix this code">Fix</button>
                        <button type="button" class="quick-btn" data-prompt="Optimize this code">Optimize</button>
                    </div>
                    <span id="status" class="status">Ready</span>
                    <button id="send-btn" type="submit">Send</button>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
