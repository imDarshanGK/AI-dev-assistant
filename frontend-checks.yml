name: Frontend CI

on:
  push:
    paths:
      - 'frontend/**'
  pull_request:
    paths:
      - 'frontend/**'

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start local W3C validator server
        run: |
          docker run -d -p 8888:8888 ghcr.io/validator/validator:latest
          until curl -s http://localhost:8888/ > /dev/null; do sleep 1; done

      - name: Validate HTML syntax
        run: npx --yes w3c-html-validator "frontend/index.html" --check-url=http://localhost:8888/

      - name: Check for broken local links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline "frontend/index.html"
          fail: true
