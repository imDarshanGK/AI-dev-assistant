# nginx.conf — Custom configuration for the QyverixAI frontend service
# Issue #533: Add caching headers for static frontend assets
#
# Cache durations are intentionally conservative because frontend asset
# filenames are NOT content-hashed.  Using long-lived "immutable" caching
# would serve stale JS/CSS after a deployment.  The chosen windows balance
# reduced server load against acceptable staleness risk.

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── HTML files ─────────────────────────────────────────────────────────────
    # Always revalidate so users receive the latest app shell after each deploy.
    # "no-cache" tells the browser to check with the server before using a
    # stored copy; combined with must-revalidate it will not serve stale HTML
    # even if the stored copy has not yet expired.
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # ── JavaScript and CSS ─────────────────────────────────────────────────────
    # 1-hour cache.  Short enough to limit stale-asset exposure after a deploy
    # while still providing a meaningful reduction in repeat downloads.
    location ~* \.(js|css)$ {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # ── Images and favicon ─────────────────────────────────────────────────────
    # 24-hour cache.  Image assets change rarely between deploys, so a
    # day-long TTL avoids redundant downloads without meaningful staleness risk.
    location ~* \.(png|jpg|jpeg|gif|svg|webp|ico)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # ── Web fonts ──────────────────────────────────────────────────────────────
    # 7-day cache.  Fonts almost never change; a week-long TTL avoids repeated
    # large downloads without any practical staleness concern.
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    # ── Default / SPA fallback ─────────────────────────────────────────────────
    # Serve files as-is; fall back to index.html for client-side routing.
    # No explicit Cache-Control here; Nginx's default (no header) is acceptable
    # for unknown file types — the browser will use heuristic caching.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
